<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="250" cy="200" r="180" fill="url(#truckGrad)"/>
  
  <!-- Truck body -->
  <rect x="80" y="180" width="200" height="100" rx="5" fill="#ffffff" opacity="0.9"/>
  
  <!-- Truck cab -->
  <path d="M280 180 L280 280 L350 280 L350 220 L320 180 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Windows -->
  <rect x="290" y="195" width="45" height="35" rx="3" fill="#003366" opacity="0.6"/>
  
  <!-- Wheels -->
  <circle cx="140" cy="290" r="30" fill="#003366" opacity="0.8"/>
  <circle cx="140" cy="290" r="15" fill="#ffffff" opacity="0.9"/>
  <circle cx="310" cy="290" r="30" fill="#003366" opacity="0.8"/>
  <circle cx="310" cy="290" r="15" fill="#ffffff" opacity="0.9"/>
  
  <!-- ELD Device on truck -->
  <rect x="100" y="200" width="60" height="40" rx="5" fill="#c41230" opacity="0.9"/>
  <rect x="108" y="208" width="44" height="24" rx="2" fill="#ffffff" opacity="0.9"/>
  
  <!-- Signal waves from ELD -->
  <path d="M175 210 Q190 200 175 190" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M185 215 Q205 200 185 185" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M195 220 Q220 200 195 180" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.2"/>
  
  <!-- Checkmark badge -->
  <circle cx="380" cy="150" r="40" fill="#ffffff" opacity="0.9"/>
  <circle cx="380" cy="150" r="32" fill="#003366" opacity="0.9"/>
  <path d="M365 150 L375 160 L395 140" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Document icon -->
  <rect x="60" y="100" width="50" height="60" rx="3" fill="#ffffff" opacity="0.8"/>
  <line x1="70" y1="115" x2="100" y2="115" stroke="#003366" stroke-width="2" opacity="0.5"/>
  <line x1="70" y1="125" x2="100" y2="125" stroke="#003366" stroke-width="2" opacity="0.5"/>
  <line x1="70" y1="135" x2="90" y2="135" stroke="#003366" stroke-width="2" opacity="0.5"/>
  <line x1="70" y1="145" x2="95" y2="145" stroke="#003366" stroke-width="2" opacity="0.5"/>
</svg>
