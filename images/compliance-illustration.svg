<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="50" y="30" width="300" height="290" rx="10" fill="url(#bgGrad)"/>
  
  <!-- Main document -->
  <rect x="80" y="60" width="180" height="220" rx="5" fill="#ffffff" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Document header -->
  <rect x="80" y="60" width="180" height="40" rx="5" fill="#003366"/>
  <text x="170" y="85" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">COMPLIANCE REPORT</text>
  
  <!-- Checkmarks -->
  <circle cx="105" cy="125" r="12" fill="#003366"/>
  <path d="M100 125 L103 128 L110 121" stroke="#ffffff" stroke-width="2" fill="none"/>
  <rect x="125" y="118" width="120" height="8" rx="2" fill="#dee2e6"/>
  <rect x="125" y="118" width="100" height="8" rx="2" fill="#003366" opacity="0.7"/>
  
  <circle cx="105" cy="160" r="12" fill="#003366"/>
  <path d="M100 160 L103 163 L110 156" stroke="#ffffff" stroke-width="2" fill="none"/>
  <rect x="125" y="153" width="120" height="8" rx="2" fill="#dee2e6"/>
  <rect x="125" y="153" width="85" height="8" rx="2" fill="#003366" opacity="0.7"/>
  
  <circle cx="105" cy="195" r="12" fill="#003366"/>
  <path d="M100 195 L103 198 L110 191" stroke="#ffffff" stroke-width="2" fill="none"/>
  <rect x="125" y="188" width="120" height="8" rx="2" fill="#dee2e6"/>
  <rect x="125" y="188" width="110" height="8" rx="2" fill="#003366" opacity="0.7"/>
  
  <circle cx="105" cy="230" r="12" fill="#003366"/>
  <path d="M100 230 L103 233 L110 226" stroke="#ffffff" stroke-width="2" fill="none"/>
  <rect x="125" y="223" width="120" height="8" rx="2" fill="#dee2e6"/>
  <rect x="125" y="223" width="95" height="8" rx="2" fill="#003366" opacity="0.7"/>
  
  <!-- Score badge -->
  <circle cx="300" cy="100" r="45" fill="#ffffff" stroke="#003366" stroke-width="3"/>
  <text x="300" y="95" text-anchor="middle" fill="#003366" font-size="24" font-weight="bold">92</text>
  <text x="300" y="115" text-anchor="middle" fill="#6c757d" font-size="10">RRI SCORE</text>
  
  <!-- Shield icon -->
  <path d="M290 180 L290 220 C290 240 320 255 320 255 C320 255 350 240 350 220 L350 180 L320 170 Z" 
        fill="#003366" opacity="0.1" stroke="#003366" stroke-width="2"/>
  <path d="M310 205 L318 213 L335 196" stroke="#003366" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative elements -->
  <circle cx="330" cy="280" r="25" fill="#c41230" opacity="0.1"/>
  <circle cx="70" cy="300" r="20" fill="#003366" opacity="0.1"/>
</svg>
